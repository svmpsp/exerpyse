name: CI

on:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install

      - name: Lint (pylint)
        run: poetry run pylint exerpyse

      - name: Format check (black)
        run: poetry run black --check exerpyse tests

      - name: Import order check (isort)
        run: poetry run isort --check exerpyse tests

      - name: Typecheck (mypy)
        run: poetry run mypy exerpyse

      - name: Tests (pytest)
        run: poetry run pytest
